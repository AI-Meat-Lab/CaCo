name: CaCo CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        environment-file: CaCo_env.yml
        auto-activate-base: false
        activate-environment: CaCo

    - name: Cache Conda environment
      uses: actions/cache@v3
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ hashFiles('CaCo_env.yml') }}
        restore-keys: |
          ${{ runner.os }}-conda-

    - name: Download database
      shell: bash -l {0}
      run: |
        python3 CaCo.py -m download

    # Check that the required example input files exist
    - name: Verify example input files
      shell: bash -l {0}
      run: |
        MISSING=0
        for f in example/gltest.txt \
                 example/TARA_SAMEA2620259_METAG_HFKLHEHB.fa \
                 example/TARA_SAMN05326651_METAG_RED00102.fa \
                 example/TARA_SAMEA2620259_METAG_HFKLHEHB.faa \
                 example/TARA_SAMN05326651_METAG_RED00102.faa; do
          if [ ! -f "$f" ]; then
            echo "❌ Missing required test file: $f"
            MISSING=1
          fi
        done
        if [ $MISSING -eq 1 ]; then
          echo "Please add the missing example files to the repository or adjust the test paths."
          exit 1
        fi

    - name: Run example commands
      shell: bash -l {0}
      run: |
        # Test 1: Genome groups
        echo "Running: genome groups test"
        python3 CaCo.py -m from_nucleotides -gl tests/example/gltest.txt
        
        # Test 2: Pairwise contigs
        echo "Running: pairwise contigs test"
        python3 CaCo.py -m from_nucleotides -g1 tests/example/TARA_SAMEA2620259_METAG_HFKLHEHB.fa -g2 tests/example/TARA_SAMN05326651_METAG_RED00102.fa
        
        # Test 3: Pairwise proteins
        echo "Running: pairwise proteins test"
        python3 CaCo.py -m from_proteins -g1 tests/example/TARA_SAMEA2620259_METAG_HFKLHEHB.faa -g2 tests/example/TARA_SAMN05326651_METAG_RED00102.faa

    - name: Validate output against expected results
      shell: bash -l {0}
      run: |
        # Decompress expected competition output if it exists
        if [ -f tests/expected_res/carboncomp_output.tsv.xz ]; then
          unxz -c tests/expected_res/carboncomp_output.tsv.xz > expected_competition.tsv
        else
          echo "❌ Expected file carboncomp_output.tsv.xz not found in tests/expected_res/"
          exit 1
        fi
        
        # Compare allfams.tsv
        if [ ! -f allfams.tsv ]; then
          echo "❌ Generated allfams.tsv not found"
          exit 1
        fi
        if [ ! -f tests/expected_res/allfams.tsv ]; then
          echo "❌ Expected allfams.tsv not found in tests/expected_res/"
          exit 1
        fi
        diff -u allfams.tsv tests/expected_res/allfams.tsv || \
          (echo "❌ allfams.tsv does not match expected output" && exit 1)
        
        # Compare allsubs.tsv
        if [ ! -f allsubs.tsv ]; then
          echo "❌ Generated allsubs.tsv not found"
          exit 1
        fi
        if [ ! -f tests/expected_res/allsubs.tsv ]; then
          echo "❌ Expected allsubs.tsv not found in tests/expected_res/"
          exit 1
        fi
        diff -u allsubs.tsv tests/expected_res/allsubs.tsv || \
          (echo "❌ allsubs.tsv does not match expected output" && exit 1)
        
        # Compare competition output
        if [ ! -f carboncomp_output.tsv.xz ]; then
          echo "❌ Generated carboncomp_output.tsv.xz not found"
          exit 1
        fi
        unxz -c carboncomp_output.tsv.xz > current_competition.tsv
        diff -u current_competition.tsv expected_competition.tsv || \
          (echo "❌ Competition output does not match expected results" && exit 1)
        
        echo "✅ All validation checks passed!"

    - name: Upload test outputs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-outputs
        path: |
          allfams.tsv
          allsubs.tsv
          carboncomp_output.tsv.xz
          *.tsv
