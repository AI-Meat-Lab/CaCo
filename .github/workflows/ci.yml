name: CaCo CI

on:
  push:
    branches: [ "main", "celiosantosjr-patch-1" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        environment-file: CaCo_env.yml
        auto-activate-base: false
        activate-environment: CaCo

    - name: Cache Conda environment
      uses: actions/cache@v3
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ hashFiles('CaCo_env.yml') }}
        restore-keys: |
          ${{ runner.os }}-conda-

    - name: Download database
      shell: bash -l {0}
      run: |
        python3 CaCo.py -m download

    - name: Download missing example input files
      shell: bash -l {0}
      run: |
        mkdir -p example
        cd example
        # Download the required input files from the original CaCo repository
        wget https://raw.githubusercontent.com/celiosantosjr/CaCo/main/example/gltest.txt
        wget https://raw.githubusercontent.com/celiosantosjr/CaCo/main/example/TARA_SAMEA2620259_METAG_HFKLHEHB.fa
        wget https://raw.githubusercontent.com/celiosantosjr/CaCo/main/example/TARA_SAMN05326651_METAG_RED00102.fa
        wget https://raw.githubusercontent.com/celiosantosjr/CaCo/main/example/TARA_SAMEA2620259_METAG_HFKLHEHB.faa
        wget https://raw.githubusercontent.com/celiosantosjr/CaCo/main/example/TARA_SAMN05326651_METAG_RED00102.faa
        cd ..

    - name: Run example commands
      shell: bash -l {0}
      run: |
        # Test 1: Genome groups
        python3 CaCo.py -m from_nucleotides -gl example/gltest.txt
        
        # Test 2: Pairwise contigs
        python3 CaCo.py -m from_nucleotides -g1 example/TARA_SAMEA2620259_METAG_HFKLHEHB.fa -g2 example/TARA_SAMN05326651_METAG_RED00102.fa
        
        # Test 3: Pairwise proteins
        python3 CaCo.py -m from_proteins -g1 example/TARA_SAMEA2620259_METAG_HFKLHEHB.faa -g2 example/TARA_SAMN05326651_METAG_RED00102.faa

    - name: Validate output against expected results
      shell: bash -l {0}
      run: |
        # Decompress expected competition output
        if [ ! -f tests/expected_res/carboncomp_output.tsv.xz ]; then
          echo "❌ Expected file carboncomp_output.tsv.xz not found in tests/expected_res/"
          exit 1
        fi
        unxz -c tests/expected_res/carboncomp_output.tsv.xz > expected_competition.tsv
        
        # Compare allfams.tsv
        if [ ! -f allfams.tsv ]; then
          echo "❌ Generated allfams.tsv not found"
          exit 1
        fi
        diff -u allfams.tsv tests/expected_res/allfams.tsv || \
          (echo "❌ allfams.tsv does not match expected output" && exit 1)
        
        # Compare allsubs.tsv
        if [ ! -f allsubs.tsv ]; then
          echo "❌ Generated allsubs.tsv not found"
          exit 1
        fi
        diff -u allsubs.tsv tests/expected_res/allsubs.tsv || \
          (echo "❌ allsubs.tsv does not match expected output" && exit 1)
        
        # Compare competition output
        if [ ! -f carboncomp_output.tsv.xz ]; then
          echo "❌ Generated carboncomp_output.tsv.xz not found"
          exit 1
        fi
        unxz -c carboncomp_output.tsv.xz > current_competition.tsv
        diff -u current_competition.tsv expected_competition.tsv || \
          (echo "❌ Competition output does not match expected results" && exit 1)
        
        echo "✅ All validation checks passed!"

    - name: Upload test outputs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-outputs
        path: |
          allfams.tsv
          allsubs.tsv
          carboncomp_output.tsv.xz
          *.tsv
